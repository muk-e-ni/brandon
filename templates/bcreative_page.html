<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCreative - Coming Soon</title>

    
<!--section [Credit to https://favicongenerator.io]-->
<link rel="icon" href="/favicon-package/favicon.svg" type="image/svg+xml" sizes="any">
<link rel="icon" href="/favicon-package/favicon.ico">
<link rel="apple-touch-icon" href="/favicon-package/apple-touch-icon.png">
<link rel="manifest" href="/favicon-package/site.webmanifest">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="/assets/css/bcreative-styling.css">
</head>
<body>
 

    <div class="coming-soon-container">

           <div class="back-btn-div">
<button class="back-btn" onclick="goBack()">← Back</button> </div>
        <div class="background-effects">
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
                <div class="shape shape-5"></div>
            </div>
            <div class="particles" id="particles-js"></div>
        </div>
        
        <div class="content">


            <h1 class="title">BCreative</h1>
            <p class="subtitle">Website Coming Soon...</p>
            <p class="description">I'm working on something amazing. Stay tuned!</p>
            
            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <span class="progress-text">Development Progress: <span id="progress-percent">55%</span></span>
            </div>
            
        </div>
        
    </div>

    <script src="/assets/js/bcreative.js"></script>
</body>
</html>
